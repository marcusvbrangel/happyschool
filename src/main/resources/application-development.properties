server.port=8085
spring.application.name=happyschool

spring.devtools.add-properties=true

spring.thymeleaf.cache=false

spring.datasource.url=jdbc:mysql://localhost:3306/happyschool?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=admin
spring.datasource.password=1234

spring.jpa.open-in-view=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jakarta.persistence.validation.mode=none

logging.level.root=INFO
spring.logging.level.org.springframework.web=INFO
spring.logging.level.com.marcusvbrangel.happyschool=INFO
logging.level.com.marcusvbrangel.happyschool.aspects=ERROR

management.endpoints.web.base-path=/happyschool/actuator
management.endpoints.web.exposure.include=*

logging.pattern.console = ${LOGPATTERN_CONSOLE:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %yellow(%logger{15}) - %msg%n}
#spring.output.ansi.enabled=ALWAYS

debug: false
