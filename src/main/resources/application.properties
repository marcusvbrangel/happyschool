server.port=8085
spring.application.name=happyschool

spring.profiles.active=development
spring.devtools.add-properties=true

spring.datasource.url=jdbc:mysql://localhost:3306/happyschool?useSSL=false&serverTimezone=UTC
spring.datasource.username=admin
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.thymeleaf.cache=false

spring.logging.level.org.springframework.web=DEBUG
spring.logging.level.org.hibernate.SQL=DEBUG
spring.logging.level.org.hibernate.type.descriptor.sql.BasicBinder=DEBUG
spring.logging.level.com.marcusvbrangel.happyschool=DEBUG

debug: false
